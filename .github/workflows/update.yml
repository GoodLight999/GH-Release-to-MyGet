name: Auto Update Packages
on:
  schedule:
    - cron: '0 5 * * *' # Run at 05:00 UTC every day
  workflow_dispatch: # Allow manual trigger

jobs:
  update_packages:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate and Pack Chocolatey Packages
        run: .\Generate-Packages.ps1 -TargetUrls "${{ vars.TARGET_URLS }}"
        shell: powershell

      - name: Push to MyGet
        run: |
          # The packages were created directly inside the auto-generated folders under ./packages
          if (Test-Path ".\packages") {
            Get-ChildItem -Path ".\packages" -Recurse -Filter "*.nupkg" | ForEach-Object {
              Write-Host "Pushing $($_.Name)..."
              choco push $_.FullName --source "https://www.myget.org/F/goodlight-desktop-repo/api/v2/package" --api-key ${{ secrets.MYGET_API_KEY }} --force
            }
          } else {
            Write-Host "No packages directory found. Nothing to push."
          }
        shell: powershell
